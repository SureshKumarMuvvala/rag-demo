<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="RAG TCO">
  <rect width="32" height="32" rx="7" fill="#15242B" />
  <!-- Segment 1 — visible cost (slightly taller), petrol-light -->
  <rect x="8" y="5" width="16" height="6" rx="2.2" fill="#2DA0A0" />
  <!-- Amber waterline — solid hairline so it survives at 16px -->
  <line x1="6.5" y1="13" x2="25.5" y2="13" stroke="#C2790C" stroke-width="2.2" stroke-linecap="round" />
  <!-- Segments 2–4 — below the waterline, lightening toward ice on the ink tile -->
  <rect x="8" y="15" width="16" height="4" rx="2" fill="#5FC2C2" />
  <rect x="8" y="20.4" width="16" height="4" rx="2" fill="#A9DCDC" />
  <rect x="8" y="25.8" width="16" height="4" rx="2" fill="#EAF6F6" />
</svg>
