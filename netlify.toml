# Netlify configuration — read on every push, so no build settings are needed in the UI
# beyond connecting the repo and pointing the production branch at `master`.
#
# The Vite app lives in the `frontend/` subdirectory, so `base` scopes install +
# build there and `publish` is resolved relative to that base (→ frontend/dist).

[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA fallback: serve index.html for any path (hard refresh / deep links).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  # The production context maps to the `master` branch.
  # Also set the production branch to `master` in the Netlify UI:
  # Site configuration → Build & deploy → Branches → Production branch = master.
